<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PsicoFlow - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">🧠</div>
        <div>
          <div class="brand-title">Clínica</div>
          <div class="brand-sub">Administração</div>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-link" data-nav="dashboard">Dashboard</button>
        <button class="nav-link" data-nav="pacientes">Pacientes</button>
        <button class="nav-link is-active" data-nav="admin">Admin</button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-email" id="userEmail">—</div>
        <button class="btn btn-ghost" id="btnLogout">Sair</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1 class="page-title">Admin</h1>
        <div class="topbar-actions">
          <span class="muted" style="font-weight:700;font-size:12.5px" id="adminHint">Acesso restrito</span>
        </div>
      </header>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">Logs de login</h2>
          <div class="panel-sub muted">Registros de sucesso e falha (MVP).</div>
        </div>

        <div class="panel-body">
          <div class="toolbar" style="margin-bottom:12px;display:flex;gap:10px;align-items:center;">
            <button class="btn" id="btnReload">Atualizar</button>
            <label class="field" style="margin:0;">
              <span class="label">Limite</span>
              <input id="logsLimit" class="input" type="number" min="1" max="500" value="200" style="width:110px;height:44px;" />
            </label>
          </div>

          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Quando</th>
                  <th>Email</th>
                  <th>Resultado</th>
                  <th>Mensagem</th>
                </tr>
              </thead>
              <tbody id="logsTbody"></tbody>
            </table>
          </div>

          <div class="empty" id="logsEmpty" style="display:none;">Sem logs.</div>

          <div class="error" id="adminError" role="alert" style="margin-top:12px;"></div>
          <div class="status" id="adminStatus" style="margin-top:8px;"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
